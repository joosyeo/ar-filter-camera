<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AI 기반 멀티 AR 필터 카메라 - 선글라스, 볼터치, 네온 가발 등 다양한 실시간 필터 적용">
    <meta name="theme-color" content="#111">
    <title>나만의 멀티 AR 필터 카메라</title>
    
    <!-- Google MediaPipe AI Engine -->
    <script defer src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="camera-box">
        <canvas id="arCanvas"></canvas>
        <video id="webcam" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <!-- Filter Selection Menu -->
        <div class="row">
            <select id="filterSelect">
                <option value="sunglasses">🕶️ 스웨그 선글라스</option>
                <option value="blush">🌸 뽀샤시 볼터치</option>
                <option value="neonHair">🔥 사이버 네온 가발</option>
                <option value="none">❌ 필터 끄기</option>
            </select>
        </div>
        
        <div class="row">
            <select id="cameraSelect">
                <option value="user">📷 전면 카메라</option>
                <option value="environment">🌲 후면 카메라</option>
            </select>
            <label class="file-label" for="bgmInput">🎵 음악 선택</label>
            <input type="file" id="bgmInput" accept="audio/*">
        </div>
        <button id="recordBtn" class="record-btn">🔴 촬영 시작</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
